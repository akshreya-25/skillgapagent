{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-5">
        <div class="card border-0 shadow-lg rounded-4 p-4">
            <div class="card-body">
                <div class="text-center mb-4">
                    <i class="fa-solid fa-graduation-cap text-primary fa-3x mb-2"></i>
                    <h3 class="fw-bold">Sign In</h3>
                    <p class="text-muted small">Enter your credentials to access your skill gap portfolio</p>
                </div>
                
                <form action="{{ url_for('main.login') }}" method="POST">
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="username_or_email" name="username_or_email" placeholder="Username or Email" required>
                        <label for="username_or_email">Username or Email</label>
                    </div>
                    
                    <div class="form-floating mb-4">
                        <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                        <label for="password">Password</label>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill fw-bold shadow-sm mb-3">
                        Login <i class="fa-solid fa-right-to-bracket ms-1"></i>
                    </button>
                </form>
                
                <div class="text-center mt-3">
                    <span class="text-muted small">Don't have an account?</span>
                    <a href="{{ url_for('main.register') }}" class="small fw-bold text-decoration-none ms-1">Register here</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
