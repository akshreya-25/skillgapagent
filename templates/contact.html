{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center py-4">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm rounded-4 p-4">
            <div class="card-body">
                <h3 class="fw-bold text-dark mb-2"><i class="fa-solid fa-envelope text-primary me-2"></i>Contact Advisor Support</h3>
                <p class="text-muted small mb-4">Have questions about your report or recommendations? Send us a message and our support team will follow up.</p>
                
                <form action="{{ url_for('main.contact') }}" method="POST">
                    <!-- Name Input -->
                    <div class="mb-3">
                        <label for="name" class="form-label small fw-bold text-dark mb-1">Your Name</label>
                        <input type="text" class="form-control p-3 rounded-3" id="name" name="name" placeholder="John Doe" required>
                    </div>
                    
                    <!-- Email Input -->
                    <div class="mb-3">
                        <label for="email" class="form-label small fw-bold text-dark mb-1">Email Address</label>
                        <input type="email" class="form-control p-3 rounded-3" id="email" name="email" placeholder="john@example.com" required>
                    </div>
                    
                    <!-- Message Textarea -->
                    <div class="mb-4">
                        <label for="message" class="form-label small fw-bold text-dark mb-1">Feedback / Message</label>
                        <textarea class="form-control rounded-3 p-3" id="message" name="message" rows="5" placeholder="Enter your detailed query here..." required></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill fw-bold shadow-sm">
                        Send Message <i class="fa-solid fa-paper-plane ms-1"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
